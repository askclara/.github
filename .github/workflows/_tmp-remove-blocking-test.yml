name: Tmp Trigger Remove Blocking Test

on:
  workflow_dispatch:
    inputs:
      issue-number:
        description: Closed blocker issue number
        required: true
        type: number
      repo:
        description: owner/repo
        required: true
        type: string
        default: askclara/.github

jobs:
  remove-blocking-links:
    uses: askclara/.github/.github/workflows/remove-blocking-on-close.yml@main
    with:
      issue-number: ${{ inputs.issue-number }}
      repo: ${{ inputs.repo }}
    secrets:
      AC_AUTOMATION_PAT: ${{ secrets.AC_AUTOMATION_PAT }}
